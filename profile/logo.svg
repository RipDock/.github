        C101.3 88.8 88.8 101.3 84 125
        C79.2 101.3 66.7 88.8 43 84
        C66.7 79.2 79.2 66.7 84 43Z"/>
    </g>
    <g id="nodes" class="white" stroke="#0B1020" stroke-width="6">
      <circle cx="84" cy="12" r="17"/>
      <circle cx="156" cy="84" r="17"/>
      <circle cx="84" cy="156" r="17"/>
      <circle cx="12" cy="84" r="17"/>
    </g>
  </g>

  <g id="wordmark" transform="translate(177 28)">
    <text x="0" y="76" class="ink" font-family="Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="86" font-weight="760" letter-spacing="-1">RipDock</text>
