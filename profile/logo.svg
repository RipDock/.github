<svg width="568" height="156" viewBox="0 0 568 156" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RipDock compact logo</title>
  <desc id="desc">Balanced compact horizontal RipDock logo with the circular dock symbol and RipDock wordmark for everyday product use.</desc>
  <defs>
    <style>
      .blue { stroke: #2F80FF; }
      .ink { fill: #0B1020; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>

  <g id="symbol" transform="translate(16 12) scale(0.78)">
    <circle cx="84" cy="84" r="82" fill="#0B1020"/>
    <g id="dock-ring" class="blue" stroke-width="14" stroke-linecap="butt">
      <path d="M84 12 A72 72 0 0 1 156 84"/>
      <path d="M156 84 A72 72 0 0 1 84 156"/>
      <path d="M84 156 A72 72 0 0 1 12 84"/>
      <path d="M12 84 A72 72 0 0 1 84 12"/>
    </g>
    <g id="runtime-star" class="white">
      <path d="M84 43
